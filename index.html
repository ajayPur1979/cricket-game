// ─── Audio ─────────────────────────────────────────────────────
let actx=null, sndOn=true;
// ── Background music engine ──────────────────────────────────
// Synthesised Bollywood-flavoured looping music:
//   - Tabla-style percussion pattern (kick + high snare hits)
//   - Sitar-like plucked melody (pentatonic phrase, 4-bar loop)
//   - Brass/horn stab accents on downbeats
//   - Gentle reverb tail via comb filter
// Tempo: 128 bpm (energetic, celebratory)

let musicGainNode=null, musicPlaying=false, musicSchedTimer=null;
let musicBarOffset=0;   // tracks which bar of the 4-bar phrase we're on

function getAC(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();}return actx;}

// ── Low-level primitives ──────────────────────────────────────
function playOsc(freq, type, gainVal, startT, dur, ac, dest){
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0,startT);
  g.gain.linearRampToValueAtTime(gainVal, startT+0.008);
  g.gain.exponentialRampToValueAtTime(0.001, startT+dur);
  o.connect(g); g.connect(dest);
  o.start(startT); o.stop(startT+dur+0.01);
}

function playNoise(gainVal, startT, dur, lpHz, ac, dest){
  const sr=ac.sampleRate, len=Math.ceil(dur*sr+0.1*sr);
  const buf=ac.createBuffer(1,len,sr);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=ac.createBufferSource();
  src.buffer=buf;
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lpHz;
  const g=ac.createGain();
  g.gain.setValueAtTime(gainVal,startT);
  g.gain.exponentialRampToValueAtTime(0.001,startT+dur);
  src.connect(f); f.connect(g); g.connect(dest);
  src.start(startT); src.stop(startT+dur+0.01);
}

// ── Sitar-style plucked note (Karplus-Strong approximation) ──
function playSitar(freq, gainVal, startT, dur, ac, dest){
  // Use a sawtooth + filter + quick decay to mimic sitar pluck
  const o=ac.createOscillator(), o2=ac.createOscillator();
  const f=ac.createBiquadFilter(), g=ac.createGain();
  o.type='sawtooth';  o.frequency.value=freq;
  o2.type='triangle'; o2.frequency.value=freq*2.003; // slight detune = sitar buzz
  f.type='bandpass';  f.frequency.value=freq*1.8; f.Q.value=1.2;
  g.gain.setValueAtTime(0,startT);
  g.gain.linearRampToValueAtTime(gainVal, startT+0.005);
  g.gain.exponentialRampToValueAtTime(0.001, startT+dur);
  o.connect(f); o2.connect(f); f.connect(g); g.connect(dest);
  o.start(startT); o2.start(startT);
  o.stop(startT+dur+0.01); o2.stop(startT+dur+0.01);
}

// ── Tabla kick (dha) ──────────────────────────────────────────
function tablaDha(t, vel, ac, dest){
  // Low thud
  const o=ac.createOscillator(), g=ac.createGain();
  o.type='sine'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(55,t+0.09);
  g.gain.setValueAtTime(vel*0.55,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o.connect(g); g.connect(dest); o.start(t); o.stop(t+0.25);
  // Skin snap
  playNoise(vel*0.18, t, 0.06, 3200, ac, dest);
}

// ── Tabla tin (na/ti) — high skin hit ────────────────────────
function tablaTin(t, vel, ac, dest){
  const o=ac.createOscillator(), g=ac.createGain();
  o.type='triangle'; o.frequency.setValueAtTime(380,t); o.frequency.exponentialRampToValueAtTime(220,t+0.06);
  g.gain.setValueAtTime(vel*0.32,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.connect(g); g.connect(dest); o.start(t); o.stop(t+0.14);
  playNoise(vel*0.10, t, 0.04, 8000, ac, dest);
}

// ── Brass stab ───────────────────────────────────────────────
function brassStab(freq, t, vel, ac, dest){
  const o=ac.createOscillator(), g=ac.createGain();
  o.type='sawtooth'; o.frequency.value=freq;
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1800;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vel*0.28, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.22);
  o.connect(f); f.connect(g); g.connect(dest);
  o.start(t); o.stop(t+0.25);
}

// ── 4-bar musical phrase ──────────────────────────────────────
// Scale: D pentatonic major → D E F# A B (frequencies in Hz, starting D4=293.7)
const PENTA = [293.7, 329.6, 370.0, 440.0, 493.9,  // D4 E4 F#4 A4 B4
               587.3, 659.3, 740.0, 880.0];          // D5 E5 F#5 A5

// Melody patterns per bar (index into PENTA, timing in beats)
const MELODY_BARS = [
  // Bar 1 — call phrase (rising)
  [{b:0,n:0},{b:0.5,n:1},{b:1,n:2},{b:1.5,n:4},{b:2,n:5},{b:3,n:6}],
  // Bar 2 — response (holds high)
  [{b:0,n:6},{b:1,n:5},{b:1.5,n:4},{b:2.5,n:6},{b:3,n:7}],
  // Bar 3 — variation (playful)
  [{b:0,n:4},{b:0.5,n:3},{b:1,n:2},{b:1.75,n:4},{b:2.5,n:5},{b:3.5,n:4}],
  // Bar 4 — resolution back to root
  [{b:0,n:5},{b:1,n:4},{b:2,n:2},{b:2.5,n:1},{b:3,n:0}],
];

// Tabla pattern (beats within a bar, 4 beats): dha=kick, tin=high
const TABLA_DHA  = [0, 2, 2.5, 3.5];          // downbeat + syncopated
const TABLA_TIN  = [0.5, 1, 1.5, 3, 3.75];    // upbeats + fills

// Brass stabs (bar-relative positions, frequencies)
const BRASS_HITS = [
  {b:0, f:220},{b:2, f:246.9},   // bar 1
  {b:0, f:246.9},                 // bar 2
  {b:0, f:220},{b:2, f:293.7},   // bar 3
  {b:0, f:196},{b:2, f:220},     // bar 4
];

let _bhBar=0; // brass bar index tracker

function scheduleBar(barIdx, barStartT, bpm, ac, dest){
  const beatDur = 60/bpm;
  const barDur  = beatDur*4;

  // Tabla pattern
  TABLA_DHA.forEach(b => tablaDha(barStartT + b*beatDur, 0.9, ac, dest));
  TABLA_TIN.forEach(b => tablaTin(barStartT + b*beatDur, 0.75, ac, dest));

  // Melody
  const mel = MELODY_BARS[barIdx % 4];
  mel.forEach(({b, n}) => {
    const freq = PENTA[n];
    playSitar(freq, 0.22, barStartT + b*beatDur, beatDur*0.55, ac, dest);
  });

  // Brass on bars 1 and 3 (0-indexed)
  if(barIdx%4===0 || barIdx%4===2){
    const brassBar = barIdx%4===0 ? BRASS_HITS.slice(0,2) : BRASS_HITS.slice(4,6);
    brassBar.forEach(({b,f}) => brassStab(f, barStartT + b*beatDur, 0.9, ac, dest));
  }
}

// ── Public API ────────────────────────────────────────────────
function startCrowdAmbience(){
  if(!sndOn || musicPlaying) return;
  try{
    const c=getAC();
    if(c.state==='suspended'){c.resume().catch(()=>{});}

    musicGainNode=c.createGain();
    musicGainNode.gain.value=0.28;

    // Add a tiny reverb with a delay node (simple echo)
    const delay=c.createDelay(0.5);
    const delayGain=c.createGain();
    delay.delayTime.value=0.22;
    delayGain.gain.value=0.18;
    musicGainNode.connect(delay);
    delay.connect(delayGain);
    delayGain.connect(delay);  // feedback loop
    musicGainNode.connect(c.destination);
    delayGain.connect(c.destination);

    musicPlaying=true;
    musicBarOffset=0;
    const BPM=128;
    const beatDur=60/BPM;
    const barDur=beatDur*4;

    // Schedule bars in advance — reschedule 1 bar before end of current one
    let nextBarStart=c.currentTime+0.05;
    function schedNext(){
      if(!musicPlaying) return;
      scheduleBar(musicBarOffset, nextBarStart, BPM, c, musicGainNode);
      musicBarOffset++;
      nextBarStart+=barDur;
      // Schedule next bar with 100ms lookahead
      musicSchedTimer=setTimeout(schedNext, (barDur-0.1)*1000);
    }
    schedNext();
  }catch(e){}
}

function stopCrowdAmbience(){
  musicPlaying=false;
  if(musicSchedTimer){clearTimeout(musicSchedTimer);musicSchedTimer=null;}
  musicGainNode=null;
}

// React music to events — swell volume on boundaries, soften on dot
function crowdReact(event){
  if(!sndOn||!musicGainNode) return;
  const c=getAC(), t=c.currentTime;
  const tgt  = event==='six'?0.48:event==='four'?0.40:event==='wicket'?0.38:event==='dot'?0.18:0.28;
  const hold  = event==='six'?2.0:event==='four'?1.5:event==='wicket'?2.5:0.4;
  musicGainNode.gain.cancelScheduledValues(t);
  musicGainNode.gain.linearRampToValueAtTime(tgt, t+0.12);
  musicGainNode.gain.setValueAtTime(tgt, t+hold);
  musicGainNode.gain.linearRampToValueAtTime(0.28, t+hold+1.8);
}
function toggleSnd(){
  sndOn=!sndOn;
  document.getElementById('sndBtn').textContent=sndOn?'🔊 ON':'🔇 OFF';
  if(sndOn){ startCrowdAmbience(); }
  else { if(musicGainNode) musicGainNode.gain.setValueAtTime(0, getAC().currentTime); }
}
function snd(type){
  if(!sndOn)return;
  try{
    const c=getAC();if(c.state==='suspended'){c.resume().catch(()=>{});}const t=c.currentTime;
    if(type==='hit'){
      const b=c.createBuffer(1,c.sampleRate*.15,c.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*.045))*.95+Math.sin(i*.4)*Math.exp(-i/(c.sampleRate*.09))*.35;
      const s=c.createBufferSource();s.buffer=b;const g=c.createGain();g.gain.value=.7;s.connect(g);g.connect(c.destination);s.start(t);
    }else if(type==='four'){
      const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';
      o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(840,t+.4);
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.32,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.9);
      o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.9);
      const b2=c.createBuffer(1,c.sampleRate*.7,c.sampleRate),d2=b2.getChannelData(0);
      for(let i=0;i<d2.length;i++)d2[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*.22))*.2;
      const s2=c.createBufferSource();s2.buffer=b2;const g2=c.createGain();g2.gain.value=.5;s2.connect(g2);g2.connect(c.destination);s2.start(t+.1);
    }else if(type==='six'){
      [[330,0],[440,.12],[550,.22],[660,.32]].forEach(([f2,dl])=>{
        const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.value=f2;
        const s2=t+dl;g.gain.setValueAtTime(0,s2);g.gain.linearRampToValueAtTime(.28,s2+.05);g.gain.exponentialRampToValueAtTime(.001,s2+.7);
        o.connect(g);g.connect(c.destination);o.start(s2);o.stop(s2+.75);
      });
      const b=c.createBuffer(1,c.sampleRate*1.1,c.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++){const e=i<c.sampleRate*.06?i/(c.sampleRate*.06):Math.exp(-(i-c.sampleRate*.06)/(c.sampleRate*.38));d[i]=(Math.random()*2-1)*e*.3;}
      const s=c.createBufferSource();s.buffer=b;const g=c.createGain();g.gain.value=.6;s.connect(g);g.connect(c.destination);s.start(t+.08);
    }else if(type==='wicket'){
      const b=c.createBuffer(1,c.sampleRate*.2,c.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*.032));
      const s=c.createBufferSource();s.buffer=b;const g=c.createGain();g.gain.value=1.0;s.connect(g);g.connect(c.destination);s.start(t);
      [.07,.13].forEach(dl=>{
        const b2=c.createBuffer(1,c.sampleRate*.08,c.sampleRate),d2=b2.getChannelData(0);
        for(let i=0;i<d2.length;i++)d2[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*.016));
        const s2=c.createBufferSource();s2.buffer=b2;const g2=c.createGain();g2.gain.value=.6;s2.connect(g2);g2.connect(c.destination);s2.start(t+dl);
      });
      const o=c.createOscillator(),og=c.createGain();o.type='sine';
      o.frequency.setValueAtTime(210,t+.18);o.frequency.exponentialRampToValueAtTime(90,t+.95);
      og.gain.setValueAtTime(0,t+.18);og.gain.linearRampToValueAtTime(.14,t+.3);og.gain.exponentialRampToValueAtTime(.001,t+1.1);
      o.connect(og);og.connect(c.destination);o.start(t+.18);o.stop(t+1.15);
    }else if(type==='dot'){
      const o=c.createOscillator(),g=c.createGain();o.type='sine';
      o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(80,t+.14);
      g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
      o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.2);
    }else if(type==='win'){
      [523,659,784,1047].forEach((f2,i)=>{
        const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=f2;
        const s2=t+i*.2;g.gain.setValueAtTime(.28,s2);g.gain.exponentialRampToValueAtTime(.001,s2+.55);
        o.connect(g);g.connect(c.destination);o.start(s2);o.stop(s2+.6);
      });
    }else if(type==='lose'){
      const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';
      o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(110,t+.85);
      g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.95);
      o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+1.0);
    }
  }catch(e){}
}

// Returns a fielding modifier applied AFTER the base shot outcome
// Types: 'clean' (normal), 'catch' (wicket), 'runout' (wicket, only on run attempts),
//        'stop1' (saves 1 run), 'stop2' (saves boundary, concedes 2), 'misfield' (extra run)

function fieldingEvent(baseRuns, shotType) {
  const r = Math.random();
  // Catch chances — higher for aerial shots
  const catchChance = { def:0.04, drv:0.06, swp:0.05, pul:0.08, lft:0.14, slg:0.18 };
  // Run-out chance (only when batsmen running 1 or 2)
  const runoutChance = 0.07;
  // Boundary save chance (fielder dives to cut off 4)
  const saveBoundaryChance = 0.22;
  // Misfield (extra run gifted)
  const misfieldChance = 0.06;

  if (baseRuns === 0) return { modifier: 'clean', runs: 0 };

  // Aerial shots can be caught
  if (baseRuns >= 4 && baseRuns < 6) {
    if (r < catchChance[shotType] * 1.4) {
      return { modifier: 'catch', runs: 0,
        c: pickFrom(['Caught in the deep! Fielder takes a screamer!', 'Caught on the boundary — so close to a six!', 'Brilliant diving catch at long-on!', 'Caught! Fielder judges it perfectly on the rope!']) };
    }
    if (r < catchChance[shotType] * 1.4 + saveBoundaryChance) {
      return { modifier: 'stop2', runs: 2,
        c: pickFrom(['Brilliant boundary save! Slides in to cut it off!', 'Athletic stop on the rope — only two!', 'Dives full length to save the four!', 'Excellent fielding effort, denied the boundary!']) };
    }
  }

  // In-air catches for loft/slog going for 1-3 runs
  if (baseRuns > 0 && baseRuns < 4 && (shotType === 'lft' || shotType === 'slg')) {
    if (r < catchChance[shotType]) {
      return { modifier: 'catch', runs: 0,
        c: pickFrom(['Caught! Fielder races in from the boundary!', 'Taken! Simple catch but well judged.', 'Skier! Fielder under it... taken!']) };
    }
  }

  // Run-out on 1s and 2s
  if (baseRuns === 1 || baseRuns === 2) {
    if (r < runoutChance) {
      const runs = baseRuns - 1;
      if (runs === 0) {
        return { modifier: 'runout', runs: 0,
          c: pickFrom(['RUN OUT! Direct hit — no time to dive!', 'Run out by a mile — terrible call!', 'Direct hit from point! The batsman is gone!', 'Brilliant throw from mid-off — run out!']) };
      } else {
        return { modifier: 'runout_one', runs: 1,
          c: pickFrom(['Run out trying for the second! Great fielding!', "Turned back but too late — run out at the non-striker's!", 'Near run-out — safe, but only one run.']) };
      }
    }
    if (r < runoutChance + misfieldChance) {
      const bonus = 1;
      return { modifier: 'misfield', runs: Math.min(baseRuns + bonus, 3),
        c: pickFrom(['Misfield in the covers — an extra run gifted!', "It goes through the fielder's legs! Extra run!", 'Poor effort in the field, they pinch an extra!']) };
    }
  }

  return { modifier: 'clean', runs: baseRuns };
}

function pickFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ─── Shot resolution (base outcome) ──────────────────────────
const dotC = () => pickFrom(['Defended back down the pitch.','Good length, no run.','Left alone outside off.','Pushed to mid-on, no run.','Dot ball — tight line.','No room to score.']);

function resolveShot(t) {
  const r = Math.random(), ov = 0|G.balls/6, phase = getFieldPhase(), death = phase==='death', pp = phase==='powerplay';
  const mid = !death && !pp;

  const shots = {
    def: () => {
      if (r < .50) return { runs:0, type:'dot',  anim:'dot',     c:dotC() };
      if (r < .78) return { runs:1, type:'run',  anim:'drive',   c:'Nudged to mid-on for a single.' };
      if (r < .92) return { runs:2, type:'run',  anim:'drive',   c:'Pushed through the gap, two!' };
                   return { runs:0, type:'wkt',  anim:'wicket',  c:'Caught behind! Played too early.', how:'bowled' };
    },
    drv: () => {
      if (r < .16) return { runs:0, type:'wkt',  anim:'wicket',  c:'Edged to slip!', how:'caught' };
      if (r < .32) return { runs:0, type:'dot',  anim:'dot',     c:'Straight to cover.' };
      if (r < .55) return { runs:1, type:'run',  anim:'drive',   c:'Driven for a single.' };
      if (r < .78) return { runs:2, type:'run',  anim:'drive',   c:'Driven through covers for two!' };
                   return { runs:4, type:'four', anim:'drive',   c:'FOUR! Gorgeous cover drive!' };
    },
    swp: () => {
      if (r < .14) return { runs:0, type:'wkt',  anim:'wicket',  c:'LBW! Missed the sweep.', how:'lbw' };
      if (r < .28) return { runs:0, type:'dot',  anim:'dot',     c:'Swept to fine leg.' };
      if (r < .54) return { runs:1, type:'run',  anim:'sweep',   c:'Swept fine for a single.' };
      if (r < .76) return { runs:2, type:'run',  anim:'sweep',   c:'Behind square for two!' };
                   return { runs:4, type:'four', anim:'sweep',   c:'FOUR! Swept to the fine leg rope!' };
    },
    pul: () => {
      if (r < .11) return { runs:0, type:'wkt',  anim:'wicket',  c:'Caught at mid-wicket!', how:'caught' };
      if (r < .20) return { runs:0, type:'dot',  anim:'dot',     c:'Pulled to the fielder.' };
      if (r < .38) return { runs:2, type:'run',  anim:'pull',    c:'Pulled for two.' };
      if (r < .63) return { runs:4, type:'four', anim:'pull',    c:'FOUR! Muscled to square leg!' };
                   return { runs:6, type:'six',  anim:'six',     c:'SIX! Massive pull over mid-wicket!' };
    },
    lft: () => {
      if (r < .18) return { runs:0, type:'wkt',  anim:'wicket',  c:'Caught at long-on!', how:'caught' };
      if (r < .36) return { runs:4, type:'four', anim:'loft',    c:'FOUR! Lofted over the infield.' };
      if (r < .63) return { runs:6, type:'six',  anim:'six',     c:'SIX! High and long over the bowler!' };
      if (r < .80) return { runs:4, type:'four', anim:'loft',    c:'FOUR! Top edge races away!' };
                   return { runs:0, type:'wkt',  anim:'wicket',  c:'Stumped! Came down and missed.', how:'stumped' };
    },
    slg: () => {
      if (r < .28) return { runs:0, type:'wkt',  anim:'wicket',  c:'Bowled! Stumps shattered!', how:'bowled' };
      if (r < .44) return { runs:0, type:'dot',  anim:'dot',     c:'Missed the slog.' };
      if (r < .57) return { runs:2, type:'run',  anim:'pull',    c:'Thick edge for two!' };
      if (r < .72) return { runs:4, type:'four', anim:'pull',    c:'FOUR! Bottom edge to boundary!' };
                   return { runs:6, type:'six',  anim:'six',     c:'SIX! Massive heave!' };
    },
  };

  let res = shots[t]();

  // No-ball (rare): batter gets a free hit next ball
  // Represented as: extra run added, ball not counting as wicket ball
  // (Simplified to keep game flow smooth)

  // Powerplay: tighter bowling, lower scoring but wickets easier
  if (pp && res.type !== 'wkt' && res.runs >= 4 && Math.random() < .15) {
    // Fielder in circle saves the boundary
    res.runs = 1 + Math.floor(Math.random()*2);
    res.type = 'run';
    res.c = 'Fielder in the circle cuts it off!';
  }
  // Death-over bonus
  if (death && res.type !== 'wkt' && res.runs > 0 && Math.random() < .09) {
    res.runs = Math.min(res.runs + 2, 6);
    res.type = res.runs===6?'six':res.runs===4?'four':res.type;
    res.anim = res.type==='six'?'six':res.type==='four'?'loft':res.anim;
  }

  // Apply fielding event (catch / run-out / misfield / boundary save)
  if (res.type !== 'wkt' && res.type !== 'six') {
    const fe = fieldingEvent(res.runs, t);
    if (fe.modifier === 'catch') {
      res = { runs:0, type:'wkt', anim: res.anim === 'dot' ? 'wicket' : res.anim, c: fe.c, how:'caught' };
    } else if (fe.modifier === 'runout') {
      res = { runs:0, type:'wkt', anim:'drive', c: fe.c, how:'runout' };
    } else if (fe.modifier === 'runout_one') {
      res = { ...res, runs:1, c: fe.c };
    } else if (fe.modifier !== 'clean') {
      res = { ...res, runs: fe.runs, c: fe.c };
    }
  }

  return res;
}

function aiShot(){
  const r=Math.random(),ov=0|G.balls/6;
  const death=ov>=16, pp=ov<6, mid=!death&&!pp;
  // ICC T20 phase-appropriate scoring rates
  // Powerplay: aggressive but wickets cheap (close catching, tight bowling)
  // Middle: consolidation, rotate strike, occasional boundary
  // Death: slog, high risk/reward
  const opts=death?[[0,'wkt',.13],[0,'dot',.10],[1,'run',.18],[2,'run',.14],[4,'four',.22],[6,'six',.23]]:
    pp?   [[0,'wkt',.10],[0,'dot',.20],[1,'run',.30],[2,'run',.16],[4,'four',.16],[6,'six',.08]]:
    /* mid*/[[0,'wkt',.09],[0,'dot',.24],[1,'run',.30],[2,'run',.18],[4,'four',.13],[6,'six',.06]];
  let cum=0;
  for(const[runs,type,p]of opts){cum+=p;if(r<cum){
    const anim=type==='wkt'?'wicket':type==='six'?'six':type==='four'?'loft':type==='dot'?'dot':'drive';
    // apply fielding to AI too
    if(type!=='wkt'&&type!=='six'){
      const fe=fieldingEvent(runs,'drv');
      if(fe.modifier==='catch') return{runs:0,type:'wkt',anim,c:'Caught in the field!',how:'caught'};
      if(fe.modifier==='runout') return{runs:0,type:'wkt',anim,c:'Run out! Great fielding!',how:'runout'};
      return{runs:fe.runs,type:fe.runs===0?'dot':fe.runs>=6?'six':fe.runs>=4?'four':'run',anim,c:fe.c||''};
    }
    return{runs,type,anim};
  }}
  return{runs:1,type:'run',anim:'drive'};
}


// ─── Flash overlay & commentary ──────────────────────────────
function getFlashText(res) {
  if (res.type==='six')  return {txt:'SIX! 🚀', col:'#ff8844'};
  if (res.type==='four') return {txt:'FOUR! 🏏', col:'#f0c040'};
  if (res.type==='wkt') {
    if(res.how==='caught')  return {txt:'CAUGHT! 🧤', col:'#ff4444'};
    if(res.how==='runout')  return {txt:'RUN OUT! 🎯', col:'#ff6600'};
    if(res.how==='stumped') return {txt:'STUMPED! ⚡', col:'#ff4488'};
    if(res.how==='lbw')     return {txt:'LBW! 👆',   col:'#ff4444'};
    return {txt:'OUT! 💥', col:'#ff4444'};
  }
  if (res.runs > 0) return {txt: res.runs + ' RUN' + (res.runs>1?'S':''), col:'#6de87a'};
  return {txt:'DOT', col:'rgba(245,240,224,.55)'};
}

function flashOverlay(text, color, dur, cb) {
  const wrap = document.querySelector('.canvas-wrap');
  const el = document.createElement('div');
  el.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:50;';
  const fs = Math.max(30, W/18);
  el.innerHTML = `<span style="font-family:'Teko',sans-serif;font-size:${fs}px;font-weight:700;color:${color};letter-spacing:5px;text-shadow:0 3px 30px rgba(0,0,0,.95),0 0 60px ${color}88;animation:fp .2s cubic-bezier(.17,.67,.35,1.4);">${text}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .35s'; el.style.opacity='0'; setTimeout(()=>{ el.remove(); cb&&cb(); },360); }, dur);
}

function doFlash(res, cb) {
  const {txt, col} = getFlashText(res);
  flashOverlay(txt, col, 1050, cb);
  // Commentary
  const commType = res.type==='six'?'six':res.type==='four'?'four':res.type==='wkt'?'wicket':res.runs===0?'dot':res.runs===1?'run1':'run2';
  const commText = getComment(commType);
  setC(commText);
  speak(commText);
  // Crowd reactions
  if(res.type==='six')   { spawnParticles('six');    triggerCrowdWave(); crowdReact('six'); }
  if(res.type==='four')  { spawnParticles('four');   triggerCrowdWave(); crowdReact('four'); }
  if(res.type==='wkt')   { spawnParticles('wicket'); crowdReact('wicket'); }
  if(res.type==='dot')   { crowdReact('dot'); }
}


// Pick animateBall path type from shot result
function ballPathType(res) {
  if(res.type === 'wkt') return 'wicket';
  if(res.type === 'dot') return 'dot';
  const dir = res.anim === 'pull'  ? 'pull'
            : res.anim === 'sweep' ? 'sweep'
            : 'drive';
  if(res.type === 'six') {
    // Each shot type → distinct six direction
    // pull  = legside six (west)
    // sweep = backward square (SW)
    // loft  = straight / over long-on (south)
    // six (slog) = offside heave (east-ish)
    // drive six (if it happens) = offside
    lastSixDir = res.anim === 'pull'  ? 'pull'
               : res.anim === 'sweep' ? 'ramp'     // sweep six = ramp over fine leg
               : res.anim === 'loft'  ? 'straight'  // loft = straight over bowler
               : res.anim === 'six'   ? 'slog'      // slog = cow corner
               : res.anim === 'dot'   ? 'ramp'      // defensive ramp
               : 'drive';                            // drive = long-off
    return 'six';
  }
  if(res.type === 'four') return dir;
  if(res.runs >= 3)       return 'loft';
  return dir + res.runs;
}


function applyBall(res) {
  const { runs, type } = res;
  if (type === 'wkt') {
    G.wkts++; G.balls++;
    const howLabel = res.how==='caught'?'C':res.how==='runout'?'RO':res.how==='stumped'?'ST':res.how==='lbw'?'LBW':'W';
    addChip(howLabel, 'wkt');
    snd('wicket');
    startFielderCelebration();  // all fielders celebrate
  } else {
    G.runs += runs; G.balls++;
    addChip(runs===0 ? '·' : String(runs), runs===0 ? 'dot' : runs===4 ? 'four' : runs===6 ? 'six' : 'run');
    if (type==='six') snd('six');
    else if (type==='four') snd('four');
    else if (runs > 0) snd('hit');
    else snd('dot');
  }
  if (res.c) setC(res.c);
  if (G.balls % 6 === 0 && G.balls > 0) addSep();
  // Immediately end match if chasing team reaches target
  if (G.inn === 2 && G.runs >= G.target) {
    G._chaseWon = true;
    setBtns(false);
    setBowlBtns(false);
  }
}

function isOverComplete() { return G.balls > 0 && G.balls % 6 === 0; }

function advanceBowlerType() {
  const overNum = Math.floor(G.balls / 6);
  currentBowlerType = BOWLER_TYPES[overNum % BOWLER_TYPES.length] || 'medium';
}

function handleOverEnd(onDone) {
  if (G._chaseWon) { onDone(); return; }
  const overJustCompleted = Math.floor(G.balls / 6);
  const oversLeft = OVERS - overJustCompleted;
  const bowlerLabel = BOWLER_TYPES[overJustCompleted % BOWLER_TYPES.length] || 'medium';
  const nextBowlerLabel = bowlerLabel==='fast' ? '⚡ Fast' : bowlerLabel==='spin' ? '🌀 Spin' : '🎯 Medium';
  // Detect phase transitions
  const nextOv = overJustCompleted + 1;
  let phaseMsg = '';
  let phaseColor = '#6de87a';
  if (nextOv === 6)  { phaseMsg = '🏏 POWERPLAY ENDS — Field spreads!'; phaseColor = '#f0c040'; }
  else if (nextOv === 15) { phaseMsg = '💀 DEATH OVERS BEGIN — Boundary riders set!'; phaseColor = '#ff7744'; }
  const wrap = document.querySelector('.canvas-wrap');
  const el = document.createElement('div');
  el.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:60;background:rgba(0,0,0,0.72);';
  el.innerHTML = `
    <div style="font-family:'Teko',sans-serif;font-size:${Math.max(22,W/22)}px;color:#f0c040;letter-spacing:4px;animation:popIn .2s ease-out;">OVER ${overJustCompleted} COMPLETE</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:${Math.max(13,W/42)}px;color:rgba(245,240,224,0.85);margin-top:6px;letter-spacing:2px;">${oversLeft} over${oversLeft!==1?'s':''} remaining</div>
    ${phaseMsg ? `<div style="font-family:'Teko',sans-serif;font-size:${Math.max(14,W/36)}px;color:${phaseColor};margin-top:8px;letter-spacing:3px;">${phaseMsg}</div>` : ''}
    <div style="font-family:'Rajdhani',sans-serif;font-size:${Math.max(12,W/48)}px;color:#6de87a;margin-top:4px;letter-spacing:2px;">Next: ${nextBowlerLabel} bowler</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:${Math.max(11,W/54)}px;color:rgba(245,240,224,0.5);margin-top:8px;letter-spacing:1px;">Batsman changing ends…</div>`;
  wrap.appendChild(el);
  // Sprite walkout animation — batsman walks to other end
  const CX=W/2, CY=H*0.58, pTop=CY-H*0.22, pBot=CY-H*0.22+H*0.44;
  const fromY = batsmanY;
  const toY   = fromY < CY ? pBot - S*38 : pTop + S*38;
  playAnim('bat', [{pose:'walkout',dur:220},{pose:'walkout',dur:220},{pose:'walkout',dur:220}], null);
  const walkStart = performance.now();
  (function walkBatsman(){
    const t = clamp((performance.now()-walkStart)/700, 0, 1);
    batsmanY = lerp(fromY, toY, easeInOut(t));
    if(t < 1) requestAnimationFrame(walkBatsman);
  })();
  setTimeout(() => {
    el.remove();
    batsmanY = toY;
    batsmanPose = 'stance';
    advanceBowlerType();
    onDone();
  }, 1600);
}

// ─── AI innings ───────────────────────────────────────────────
function runAI() {
  if (G._chaseWon || G.balls >= OVERS*6 || G.wkts >= WKTS) { finishInn(); return; }
  const res = aiShot();
  startCrowdAmbience();
  bowlerRunup(() => {
    animateBall('delivery', () => {
      playBatsmanShot(res.anim, res, null);
      const ballAnim = ballPathType(res);
      animateBall(ballAnim, () => {
        if(res.runs >= 1 && res.type !== 'four' && res.type !== 'six' && res.type !== 'wkt')
          animateRunning(res.runs, null);
      });
      applyBall(res);
      doFlash(res, () => {
        updateSB();
        // Stop immediately if target reached or match over
        if (G._chaseWon || G.balls >= OVERS*6 || G.wkts >= WKTS) { finishInn(); return; }
        const proceed = () => {
          resetBowler(); batsmanPose='stance';
          if (G._chaseWon || G.balls >= OVERS*6 || G.wkts >= WKTS) { finishInn(); return; }
          if (_playerBowling()) { setBowlBtns(true); return; }
          setTimeout(() => runAI(), 280);
        };
        if (res.type === 'wkt') {
          stumpsFallen=true;
          playAnim('bowl',[{pose:'celebJump',dur:200},{pose:'celebFist',dur:220},{pose:'idle',dur:200}],null);
          setTimeout(() => { resetPositions(); setTimeout(proceed, 300); }, 1200);
        } else if (isOverComplete()) {
          handleOverEnd(() => { resetBowler(); batsmanPose='stance'; proceed(); });
        } else {
          setTimeout(proceed, 320);
        }
      });
    });
  });
}

// ─── Player batting ───────────────────────────────────────────
async function ps(shotType) {
  if (locked || G._chaseWon) return;
  if (G.balls >= OVERS*6 || G.wkts >= WKTS) return;
  locked=true; setBtns(false);
  const res = resolveShot(shotType);
  startCrowdAmbience();
  await new Promise(r => bowlerRunup(r));
  playBatsmanShot(res.anim, res, null);
  const ballAnim = ballPathType(res);
  await new Promise(r => animateBall(ballAnim, r));
  applyBall(res);
  await new Promise(r => doFlash(res, r));
  updateSB();
  if (G._chaseWon) { locked=false; finishInn(); return; }
  if (res.type==='wkt') {
    stumpsFallen=true;
    playAnim('bowl',[{pose:'celebJump',dur:200},{pose:'celebFist',dur:220},{pose:'idle',dur:180}],null);
    await sleep(1100); resetPositions(); await sleep(300);
  } else if (res.type==='six'||res.type==='four') {
    playBatsmanShot('celebrate',res,null); await sleep(880);
  } else if (res.runs >= 1) {
    // Batsmen run between wickets
    await new Promise(r => animateRunning(res.runs, r));
  }
  // Fielder throw-back for sub-4 shots
  if (res.type !== 'four' && res.type !== 'six' && res.type !== 'wkt') {
    await new Promise(r => animateThrowback(res, r));
  }
  // Over end — only if match is still going
  if (!G._chaseWon && isOverComplete() && G.balls < OVERS*6) {
    await new Promise(r => handleOverEnd(r));
  }
  resetBowler(); batsmanPose='stance';
  if (G._chaseWon || G.balls >= OVERS*6 || G.wkts >= WKTS) { locked=false; finishInn(); return; }
  locked=false; setBtns(true);
}

// ─── Player bowling ───────────────────────────────────────────
async function pb(ballType) {
  if (locked || G._chaseWon) return;
  if (G.balls >= OVERS*6 || G.wkts >= WKTS) return;
  locked=true; setBowlBtns(false);
  const res = resolveBowl(ballType);
  startCrowdAmbience();
  await new Promise(r => bowlerRunup(r));
  playBatsmanShot(res.anim, res, null);
  const ballAnim = ballPathType(res);
  await new Promise(r => animateBall(ballAnim, r));
  applyBall(res);
  await new Promise(r => doFlash(res, r));
  updateSB();
  if (G._chaseWon) { locked=false; finishInn(); return; }
  if (res.type==='wkt') {
    stumpsFallen=true;
    playAnim('bowl',[{pose:'celebJump',dur:200},{pose:'celebFist',dur:220},{pose:'idle',dur:180}],null);
    await sleep(1100); resetPositions(); await sleep(300);
  } else if (res.type==='six'||res.type==='four') {
    await sleep(700);
  } else if (res.runs >= 1) {
    await new Promise(r => animateRunning(res.runs, r));
  }
  // Fielder throw-back for sub-4 shots
  if (res.type !== 'four' && res.type !== 'six' && res.type !== 'wkt') {
    await new Promise(r => animateThrowback(res, r));
  }
  if (!G._chaseWon && isOverComplete() && G.balls < OVERS*6) {
    await new Promise(r => handleOverEnd(r));
  }
  resetBowler(); batsmanPose='stance';
  if (G._chaseWon || G.balls >= OVERS*6 || G.wkts >= WKTS) { locked=false; finishInn(); return; }
  locked=false; setBowlBtns(true);
}

function resolveBowl(ballType) {
  const r=Math.random(), ov=0|G.balls/6, death=ov>=16;
  const tables = {
    fast: ()=>{
      if(r<.10) return {runs:0,type:'wkt',anim:'wicket',c:'Bowled! Pace does the trick!',how:'bowled'};
      if(r<.24) return {runs:0,type:'dot',anim:'dot',c:'Beaten for pace — dot ball!'};
      if(r<.44) return {runs:1,type:'run',anim:'drive',c:'Pushed for a single.'};
      if(r<.60) return {runs:2,type:'run',anim:'drive',c:'Driven for two.'};
      if(r<.74) return {runs:4,type:'four',anim:'drive',c:'FOUR! Driven through covers!'};
      if(r<.88) return {runs:0,type:'wkt',anim:'wicket',c:'Caught behind! Outside edge!',how:'caught'};
      return {runs:6,type:'six',anim:'six',c:'SIX! Smashed over mid-on!'};
    },
    swing: ()=>{
      if(r<.14) return {runs:0,type:'wkt',anim:'wicket',c:'OUT! Swings late, hits off stump!',how:'bowled'};
      if(r<.28) return {runs:0,type:'wkt',anim:'wicket',c:'Caught in the slips!',how:'caught'};
      if(r<.44) return {runs:0,type:'dot',anim:'dot',c:'Leaves it — superb swing!'};
      if(r<.64) return {runs:1,type:'run',anim:'drive',c:'Worked off the pads.'};
      if(r<.80) return {runs:2,type:'run',anim:'drive',c:'Clipped for two.'};
      return {runs:4,type:'four',anim:'drive',c:'FOUR! Hit through square leg!'};
    },
    slow: ()=>{
      if(r<.08) return {runs:0,type:'wkt',anim:'wicket',c:'Stumped! Came down and missed!',how:'stumped'};
      if(r<.18) return {runs:0,type:'dot',anim:'dot',c:'Deceived by the slower ball!'};
      if(r<.38) return {runs:1,type:'run',anim:'drive',c:'Chipped for a single.'};
      if(r<.55) return {runs:2,type:'run',anim:'drive',c:'Pushed for two.'};
      if(r<.70) return {runs:4,type:'four',anim:'drive',c:'FOUR! Saw it early, driven hard!'};
      if(r<.84) return {runs:6,type:'six',anim:'six',c:'SIX! Read it, deposited over long-on!'};
      return {runs:0,type:'wkt',anim:'wicket',c:'Caught at mid-on! Top edge!',how:'caught'};
    },
    spin: ()=>{
      if(r<.12) return {runs:0,type:'wkt',anim:'wicket',c:'LBW! Turns back into the stumps!',how:'lbw'};
      if(r<.28) return {runs:0,type:'dot',anim:'dot',c:'Defended to the offside.'};
      if(r<.46) return {runs:1,type:'run',anim:'sweep',c:'Swept fine for a single.'};
      if(r<.62) return {runs:2,type:'run',anim:'sweep',c:'Swept for two!'};
      if(r<.76) return {runs:4,type:'four',anim:'sweep',c:'FOUR! Swept to the boundary!'};
      if(r<.88) return {runs:0,type:'wkt',anim:'wicket',c:'Caught at short fine leg!',how:'caught'};
      return {runs:6,type:'six',anim:'six',c:'SIX! Down the track, over long-on!'};
    },
    leg: ()=>{
      if(r<.12) return {runs:0,type:'wkt',anim:'wicket',c:'Bowled! Googly through the gate!',how:'bowled'};
      if(r<.24) return {runs:0,type:'dot',anim:'dot',c:'Pitched on leg, turned away!'};
      if(r<.42) return {runs:1,type:'run',anim:'drive',c:'Nudged for a single.'};
      if(r<.58) return {runs:2,type:'run',anim:'pull',c:'Pulled for two.'};
      if(r<.72) return {runs:4,type:'four',anim:'pull',c:'FOUR! Ramp over point!'};
      if(r<.84) return {runs:6,type:'six',anim:'six',c:'SIX! Read the googly, smashed it!'};
      return {runs:0,type:'wkt',anim:'wicket',c:'Stumped! Missed the leg break!',how:'stumped'};
    },
    bouncer: ()=>{
      if(r<.10) return {runs:0,type:'wkt',anim:'wicket',c:'Caught at fine leg! Top edge!',how:'caught'};
      if(r<.28) return {runs:0,type:'dot',anim:'dot',c:'Ducked under it!'};
      if(r<.46) return {runs:1,type:'run',anim:'pull',c:'Gloved down for a single.'};
      if(r<.62) return {runs:2,type:'run',anim:'pull',c:'Pulled for two.'};
      if(r<.76) return {runs:4,type:'four',anim:'pull',c:'FOUR! Pulled through mid-wicket!'};
      return {runs:6,type:'six',anim:'six',c:'SIX! Flat-batted over the fence!'};
    },
  };
  let res=(tables[ballType]||tables.fast)();
  if(death && res.type!=='wkt' && res.runs>0 && Math.random()<.12){
    res.runs=Math.min(res.runs+2,6);
    res.type=res.runs===6?'six':res.runs===4?'four':res.type;
    res.anim=res.type==='six'?'six':res.type==='four'?'loft':res.anim;
  }
  return res;
}

function finishInn() {
  // Disable all controls immediately
  setBtns(false); setBowlBtns(false); locked=true;
  if (G.inn === 1) {
    G.i1={runs:G.runs,wkts:G.wkts};
    G.target=G.runs+1;
    G.inn=2; G.runs=0; G.wkts=0; G.balls=0; G._chaseWon=false;
    setTimeout(() => {
      clearTrack(); updateSB(); updateLabels();
      document.getElementById('innPill').textContent='2ND INNINGS';
      document.getElementById('tbTgt').style.display='block';
      currentBowlerType=BOWLER_TYPES[0];
      resetPositions();
      batsmanPose='stance'; bowlerPose='idle';
      locked=false;
      if (G.pbf) {
        // Player batted first → player bowls in 2nd innings
        setC(`AI needs ${G.target} to win. You are bowling!`);
        showBowlMode('SELECT YOUR DELIVERY');
      } else {
        // Player bowled first → player bats in 2nd innings
        setC(`You need ${G.target} to win! Choose your shot.`);
        showBatMode('SELECT YOUR SHOT');
      }
    }, 700);
  } else {
    setTimeout(() => showResult(), 500);
  }
}

function showResult() {
  const p1=G.i1, p2={runs:G.runs,wkts:G.wkts};
  let pSc,aSc,winner,detail;
  const p1rr=p1.balls>0?((p1.runs/p1.balls)*6).toFixed(2):'0.00';
  const p2rr=G.balls>0?((p2.runs/G.balls)*6).toFixed(2):'0.00';
  if (G.pbf) {
    pSc=`${p1.runs}/${p1.wkts}`; aSc=`${p2.runs}/${p2.wkts}`;
    if(p2.runs>=G.target){winner=aTeam;detail=`${aTeam} won by ${WKTS-p2.wkts} wickets`;}
    else{winner=pTeam;const d=(G.target-1)-p2.runs;detail=`${pTeam} won by ${d} run${d!==1?'s':''}!`;}
  } else {
    aSc=`${p1.runs}/${p1.wkts}`; pSc=`${p2.runs}/${p2.wkts}`;
    if(p2.runs>=G.target){winner=pTeam;const w=WKTS-p2.wkts;detail=`${pTeam} won by ${w} wicket${w!==1?'s':''}!`;}
    else{winner=aTeam;const d=(G.target-1)-p2.runs;detail=`${aTeam} won by ${d} runs`;}
  }
  const win=winner===pTeam;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  document.getElementById('resTrophy').textContent=win?'🏆':'😔';
  document.getElementById('resTitle').textContent=win?'YOU WIN!':'MATCH LOST';
  document.getElementById('resTitle').style.color=win?'var(--gold3)':'#ff6644';
  document.getElementById('resSubtitle').textContent='Dharamshala · T20 International';
  const sc=document.getElementById('resScorecard');
  const row=(team,score,rr,hi)=>`<div class="res-score-row${hi?' style="background:rgba(240,192,64,.05);border-radius:4px;"':''}"><span class="team">${team}</span><span class="score">${score}</span><span style="font-size:.75rem;color:rgba(245,240,224,.45);font-family:'Rajdhani'">RR ${rr}</span></div>`;
  sc.innerHTML=G.pbf ? row(pTeam,pSc,p1rr,win)+row(aTeam,aSc,p2rr,!win) : row(aTeam,aSc,p1rr,!win)+row(pTeam,pSc,p2rr,win);
  document.getElementById('resDetail').textContent=detail;
  showScreen('result');
  stopCrowdAmbience();
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  snd(win?'win':'lose');
  if(win) setTimeout(()=>spawnParticles('six'),300);
}

// ─── Mode helpers ─────────────────────────────────────────────
function _playerBowling() {
  return (G.inn===1 && !G.pbf) || (G.inn===2 && G.pbf);
}
function showBatMode(label) {
  document.getElementById('shotTitle').textContent=label||'SELECT YOUR SHOT';
  const sg=document.getElementById('shotGrid'); if(sg) sg.style.display='';
  const bg=document.getElementById('bowlGrid'); if(bg) bg.style.display='none';
  setBtns(true); setBowlBtns(false);
}
function showBowlMode(label) {
  document.getElementById('shotTitle').textContent=label||'SELECT YOUR DELIVERY';
  const sg=document.getElementById('shotGrid'); if(sg) sg.style.display='none';
  const bg=document.getElementById('bowlGrid'); if(bg) bg.style.display='';
  setBtns(false); setBowlBtns(true);
}
function setBowlBtns(e) { document.querySelectorAll('.bbtn').forEach(b=>b.disabled=!e); }

// ─── Exit ─────────────────────────────────────────────────────
function confirmExit() {
  if(document.getElementById('exitOverlay')) return;
  const el=document.createElement('div');
  el.id='exitOverlay';
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.84);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;';
  el.innerHTML=`
    <div style="font-family:'Teko',sans-serif;font-size:clamp(1.5rem,5vw,2.2rem);color:#f0c040;letter-spacing:4px;">ABANDON MATCH?</div>
    <div style="font-size:.9rem;color:rgba(245,240,224,.65);text-align:center;max-width:260px;line-height:1.5;">Your current progress will be lost.</div>
    <div style="display:flex;gap:.8rem;margin-top:.4rem;">
      <button onclick="doExit()" style="padding:.6rem 1.6rem;background:#cc2222;color:#fff;border:none;cursor:pointer;font-family:'Teko',sans-serif;font-size:1.2rem;letter-spacing:3px;border-radius:6px;">YES, EXIT</button>
      <button onclick="cancelExit()" style="padding:.6rem 1.6rem;background:rgba(255,255,255,.1);color:#f5f0e0;border:1px solid rgba(255,255,255,.25);cursor:pointer;font-family:'Teko',sans-serif;font-size:1.2rem;letter-spacing:3px;border-radius:6px;">KEEP PLAYING</button>
    </div>`;
  document.body.appendChild(el);
}
function cancelExit() { const e=document.getElementById('exitOverlay'); if(e) e.remove(); }
function doExit() {
  cancelExit();
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  stopCrowdAmbience();
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  locked=false; sceneReady=false; G={};
  showScreen('menu');
}

function updateSB() {
  const pb = (G.inn===1&&G.pbf) || (G.inn===2&&!G.pbf);
  document.getElementById('tbBat').textContent    = pb ? pTeam : aTeam;
  document.getElementById('tbField').textContent  = pb ? aTeam : pTeam;
  document.getElementById('tbScore').textContent  = `${G.runs}/${G.wkts}`;
  const co = 0|G.balls/6, bo = G.balls%6;
  const ov = co; // completed overs
  const phLbl = getFieldPhase() === 'powerplay' ? ' [PP]' : getFieldPhase() === 'middle' ? ' [MID]' : ' [DEATH]';
  document.getElementById('tbOv').textContent = `${co}.${bo} ov · ${OVERS-co} left${phLbl}`;
  const rr = G.balls > 0 ? ((G.runs/G.balls)*6).toFixed(2) : '0.00';
  document.getElementById('tbRR').textContent     = `RR ${rr}`;
  if (G.inn === 2) {
    const need = G.target - G.runs, bl = OVERS*6 - G.balls;
    const crr = bl > 0 ? ((need/bl)*6).toFixed(2) : '—';
    document.getElementById('tbTgt').textContent  = `Need ${need} · CRR ${crr}`;
  }
  // Bowler type pill
  const bLabel = currentBowlerType === 'fast' ? '⚡ FAST' : currentBowlerType === 'spin' ? '🌀 SPIN' : '🎯 MEDIUM';
  const bpEl = document.getElementById('bowlerPill');
  if (bpEl) bpEl.textContent = bLabel + ' BOWLER';
}
function setC(t)    { document.getElementById('comms').textContent = t; }
function setBtns(e) { document.querySelectorAll('.sbtn').forEach(b => b.disabled = !e); }
function addChip(l,t) {
  const c = document.createElement('div');
  c.className = `chip ${t}`; c.textContent = l;
  document.getElementById('ostrip').appendChild(c);
}
function addSep() {
  const s = document.createElement('div');
  s.className = 'chip sep'; s.textContent = '|';
  document.getElementById('ostrip').appendChild(s);
}
function clearTrack() { document.getElementById('ostrip').innerHTML = '<span class="olabel">BALLS</span>'; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'game') setTimeout(resize, 50);
}
function goMenu() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  sceneReady = false;
  showScreen('menu');
}
</script>
